<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Veritas AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <h1>Veritas AI</h1>
  <p>Loading...</p>
</div>

<!-- ROLE PAGE -->
<div id="main">
  <h1>Veritas AI</h1>
  <p>Select your role to continue</p>

  <div class="container">

    <div class="card">
      <h2>Student</h2>
      <p>Take proctored exams and view results</p>
      <button onclick="selectRole('Student')">Continue as Student</button>
    </div>

    <div class="card">
      <h2>Admin</h2>
      <p>Create tests, monitor exams</p>
      <button onclick="openAdmin()">Continue as Admin</button>
    </div>

  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminPage">
  <div class="top-bar" onclick="goBack()">← Back to Role Selection</div>

  <div class="login-card">
    <h2>Admin Login</h2>
    <p>Enter your credentials to continue</p>

    <label>Email</label>
    <input type="email" placeholder="admin@institution.edu">

    <label>Password</label>
    <input type="password" placeholder="********">

    <button onclick="login()">Login</button>

    <p class="register-text">Don't have an account? <span>Register</span></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
