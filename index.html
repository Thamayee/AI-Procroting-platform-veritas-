<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Veritas AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <h1>Veritas AI</h1>
  <p>Loading...</p>
</div>

<!-- Main Page -->
<div id="main">
  <h1>Veritas AI</h1>
  <p>Select your role to continue</p>

  <div class="container">

    <div class="card">
      <h2>Student</h2>
      <p>Take proctored exams and view results</p>
      <button onclick="selectRole('Student')">Continue as Student</button>
    </div>

    <div class="card">
      <h2>Admin</h2>
      <p>Create tests, monitor exams</p>
      <button onclick="selectRole('Admin')">Continue as Admin</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
