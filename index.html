<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Veritas AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <h1>Veritas AI</h1>
  <p>Loading...</p>
</div>

<!-- ROLE PAGE -->
<div id="main">
  <h1>Veritas AI</h1>
  <p>Select your role to continue</p>

  <div class="container">
    <div class="card">
      <h2>Student</h2>
      <button onclick="selectRole('Student')">Continue as Student</button>
    </div>

    <div class="card">
      <h2>Admin</h2>
      <button onclick="openAdmin()">Continue as Admin</button>
    </div>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminPage">

  <div class="top-bar" onclick="goBack()">
    <span class="arrow">←</span>
    <span>Back to Role Selection</span>
  </div>

  <div class="login-card">
    <h2>Admin Login</h2>

    <label>Email</label>
    <input type="email" placeholder="admin@institution.edu">

    <label>Password</label>
    <div class="password-box">
      <input type="password" id="loginPassword">
      <span onclick="togglePassword('loginPassword')">👁</span>
    </div>

    <button onclick="login()">Login</button>

    <p class="register-text">
      Don't have an account?
      <span class="link" onclick="openRegister()">Register</span>
    </p>
  </div>

</div>

<!-- REGISTER PAGE -->
<div id="registerPage">

  <div class="top-bar" onclick="backToLogin()">
    <span class="arrow">←</span>
    <span>Back to Login</span>
  </div>

  <div class="login-card">
    <h2>Admin Registration</h2>

    <label>Full Name</label>
    <input type="text" placeholder="Dr. Jane Smith">

    <label>Email</label>
    <input type="email" placeholder="example@gmail.com">

    <label>Password</label>
    <div class="password-box">
      <input type="password" id="regPass">
      <span onclick="togglePassword('regPass')">👁</span>
    </div>

    <label>Confirm Password</label>
    <div class="password-box">
      <input type="password" id="regConfirm">
      <span onclick="togglePassword('regConfirm')">👁</span>
    </div>

    <label>Organization</label>
    <input type="text" placeholder="University">

    <label>Department</label>
    <input type="text" placeholder="Computer Science">

    <label>Contact</label>
    <input type="text" placeholder="+91 XXXXX XXXXX">

    <button onclick="register()">Register</button>

    <p class="register-text">
      Already have an account?
      <span class="link" onclick="backToLogin()">Login</span>
    </p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
